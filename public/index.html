<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>AI Kids Story Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Quicksand', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#e0f2fe', // sky-100
                            darkBlue: '#0284c7', // sky-600
                            yellow: '#fde047', // yellow-300
                            darkYellow: '#eab308' // yellow-500
                        }
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f9ff;
            background-image: radial-gradient(#bae6fd 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Main Container -->
    <main class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-sky-200">
        
        <!-- Header Section -->
        <header class="bg-brand-blue p-8 text-center relative overflow-hidden">
            <!-- Decorative Elements -->
            <div class="absolute top-4 right-4 text-4xl animate-float opacity-70">⭐</div>
            <div class="absolute bottom-4 left-6 text-4xl animate-float opacity-70" style="animation-delay: 1s;">🎈</div>
            <div class="absolute top-8 left-12 text-3xl animate-float opacity-60" style="animation-delay: 2s;">🌙</div>

            <h1 class="text-3xl md:text-5xl font-extrabold text-brand-darkBlue leading-tight relative z-10 drop-shadow-sm">
                Create a magical story for your child in seconds! 🚀
            </h1>
            <p class="mt-4 text-lg md:text-xl text-sky-700 font-medium relative z-10">
                Where your child's dreams become personalized magical adventures
            </p>
        </header>

        <!-- Form Section -->
        <section class="p-8 md:p-10">
            <form id="storyForm" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Child Name -->
                    <div class="space-y-2">
                        <label for="childName" class="block text-lg font-bold text-slate-700">👦👧 Child Name</label>
                        <input type="text" id="childName" required
                            class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-brand-darkBlue focus:ring-4 focus:ring-sky-100 transition-all outline-none text-lg text-slate-800 placeholder-slate-400"
                            placeholder="e.g., Alex, Sarah...">
                    </div>

                    <!-- Child Age -->
                    <div class="space-y-2">
                        <label for="childAge" class="block text-lg font-bold text-slate-700">🎂 Child Age</label>
                        <input type="number" id="childAge" min="1" max="15" required
                            class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-brand-darkBlue focus:ring-4 focus:ring-sky-100 transition-all outline-none text-lg text-slate-800 placeholder-slate-400"
                            placeholder="e.g., 5">
                    </div>
                </div>

                <!-- Interests -->
                <div class="space-y-2">
                    <label for="interests" class="block text-lg font-bold text-slate-700">🎨 What do they love?</label>
                    <input type="text" id="interests" required
                        class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-brand-darkBlue focus:ring-4 focus:ring-sky-100 transition-all outline-none text-lg text-slate-800 placeholder-slate-400"
                        placeholder="e.g., Space, Dinosaurs, Pets...">
                </div>

                <!-- Lesson -->
                <div class="space-y-2">
                    <label for="lesson" class="block text-lg font-bold text-slate-700">💡 What lesson should they learn?</label>
                    <textarea id="lesson" rows="3" required
                        class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-brand-darkBlue focus:ring-4 focus:ring-sky-100 transition-all outline-none text-lg text-slate-800 placeholder-slate-400 resize-none"
                        placeholder="e.g., Teamwork, Honesty, Courage..."></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn"
                    class="w-full mt-4 bg-brand-yellow hover:bg-brand-darkYellow text-slate-800 text-2xl font-extrabold py-5 rounded-2xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-3">
                    <span>✨ Generate My Child's Story ✨</span>
                </button>
                
                <!-- Loading state (hidden by default) -->
                <div id="loadingState" class="hidden text-center w-full mt-4 bg-sky-100 text-sky-800 text-xl font-bold py-5 rounded-2xl">
                    <span class="inline-block animate-spin mr-2 scale-150">⏳</span> Writing the magical story...
                </div>
            </form>
            
            <!-- Story Result Container (Digital Book UI) -->
            <div id="storyResult" class="hidden mt-8 p-8 md:p-12 rounded-3xl border-4 border-[#e6ccab] transition-all duration-500" style="background-color: #fdfbf7; box-shadow: inset 0 0 60px rgba(210,180,140,0.15), 0 15px 35px rgba(0,0,0,0.1);">
            </div>

            <!-- PDF Download Button Container -->
            <div id="pdfDownloadContainer" class="hidden mt-6 text-center">
                <button type="button" onclick="downloadStoryPDF()" class="px-8 py-4 bg-brand-darkBlue hover:bg-sky-700 text-white font-bold rounded-2xl shadow-lg transition-all transform hover:-translate-y-1 text-xl flex items-center justify-center gap-3 mx-auto w-full md:w-auto">
                    <span>📥 Download Story as PDF</span>
                </button>
            </div>
        </section>
    </main>

    <script>
        // متغيرات للتحكم في صفحات القصة
        let currentStoryPages = [];
        let currentPage = 0;
        let currentChildName = '';

        // دالة لعرض الصفحة الحالية من القصة
        function renderStoryPage() {
            const storyResult = document.getElementById('storyResult');
            
            const isFirstPage = currentPage === 0;
            const isLastPage = currentPage === currentStoryPages.length - 1;
            
            // Header
            let html = `<h2 class="text-3xl md:text-4xl font-extrabold text-[#8b5a2b] mb-6 text-center border-b-2 border-dashed border-[#d2b48c] pb-6">${currentChildName}'s Story ✨</h2>`;
            
            const pageData = currentStoryPages[currentPage];
            
            // Current Paragraph (Page content)
            html += `<div class="min-h-[200px] flex items-center justify-center text-center text-2xl md:text-3xl leading-loose text-[#5c4033] font-bold px-2 py-6">
                        <p class="animate-[fade-in_0.5s_ease-in-out]">${pageData.text}</p>
                     </div>`;
                     
            // Navigation Footer
            html += `<div class="flex justify-between items-center mt-8 pt-6 border-t-2 border-dashed border-[#d2b48c]">
                        <button type="button" onclick="prevPage()" class="px-6 py-3 rounded-full bg-[#f4a460] hover:bg-[#cd853f] text-white font-bold transition-all shadow-md transform hover:scale-105 disabled:opacity-0 disabled:cursor-default" ${isFirstPage ? 'disabled' : ''}>⬅️ Previous</button>
                        
                        <span class="text-[#8b5a2b] font-bold text-lg bg-[#faebd7] px-4 py-2 rounded-xl">Page ${currentPage + 1} of ${currentStoryPages.length}</span>
                        
                        <button type="button" onclick="nextPage()" class="px-6 py-3 rounded-full bg-[#f4a460] hover:bg-[#cd853f] text-white font-bold transition-all shadow-md transform hover:scale-105 disabled:opacity-0 disabled:cursor-default" ${isLastPage ? 'disabled' : ''}>Next ➡️</button>
                     </div>`;
                     
            storyResult.innerHTML = html;
        }

        window.nextPage = function() {
            if (currentPage < currentStoryPages.length - 1) {
                currentPage++;
                renderStoryPage();
            }
        }

        window.prevPage = function() {
            if (currentPage > 0) {
                currentPage--;
                renderStoryPage();
            }
        }

        window.downloadStoryPDF = function() {
            // Create a temporary element to hold the entire formatted story
            const printDiv = document.createElement('div');
            printDiv.style.backgroundColor = '#fdfbf7';
            printDiv.style.fontFamily = 'Quicksand, sans-serif';
            printDiv.style.direction = 'ltr';
            
            // إعدادات مقاسات A4 دقيقة لمنع قص النصوص العشوائي
            const a4Height = '297mm';
            const a4Width = '210mm';
            
            // --- Cover Page ---
            const coverPage = document.createElement('div');
            coverPage.style.boxSizing = 'border-box';
            coverPage.style.width = a4Width;
            coverPage.style.height = a4Height;
            coverPage.style.display = 'flex';
            coverPage.style.flexDirection = 'column';
            coverPage.style.justifyContent = 'center';
            coverPage.style.alignItems = 'center';
            coverPage.style.pageBreakAfter = 'always';
            
            const title = document.createElement('h1');
            title.textContent = `${currentChildName}'s Story`;
            title.style.color = '#8b5a2b';
            title.style.fontSize = '80px'; // حجم ضخم للغلاف
            title.style.fontWeight = '800';
            title.style.borderBottom = '4px dashed #d2b48c';
            title.style.paddingBottom = '30px';
            title.style.margin = '0';
            coverPage.appendChild(title);
            
            printDiv.appendChild(coverPage);
            
            // --- Story Pages ---
            currentStoryPages.forEach((page, index) => {
                const pageContainer = document.createElement('div');
                pageContainer.style.boxSizing = 'border-box';
                pageContainer.style.width = a4Width;
                pageContainer.style.height = a4Height;
                pageContainer.style.display = 'flex';
                pageContainer.style.flexDirection = 'column';
                pageContainer.style.justifyContent = 'center'; 
                pageContainer.style.alignItems = 'center';
                
                if (index < currentStoryPages.length - 1) {
                    pageContainer.style.pageBreakAfter = 'always';
                }
                
                // Paragraph Text
                const p = document.createElement('p');
                p.textContent = page.text;
                p.style.fontSize = '36px'; // حجم خط للأطفال
                p.style.lineHeight = '2.2';
                p.style.color = '#5c4033';
                p.style.fontWeight = '700';
                p.style.textAlign = 'center';
                p.style.padding = '0 50px';
                p.style.margin = '0';
                pageContainer.appendChild(p);
                
                // Page Number
                const pageNum = document.createElement('div');
                pageNum.textContent = `- ${index + 1} -`;
                pageNum.style.marginTop = '80px';
                pageNum.style.color = '#d2b48c';
                pageNum.style.fontSize = '24px';
                pageNum.style.fontWeight = 'bold';
                pageContainer.appendChild(pageNum);

                printDiv.appendChild(pageContainer);
            });
            
            // PDF Options
            var opt = {
              margin:       0, // هوامش صفرية لأننا نتحكم بالمقاسات بدقة في الـ Container
              filename:     `قصة_${currentChildName}.pdf`,
              image:        { type: 'jpeg', quality: 1 },
              html2canvas:  { scale: 2, useCORS: true },
              jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
              pagebreak:    { mode: 'css', avoid: 'p' }
            };
            
            // Generate
            html2pdf().set(opt).from(printDiv).save();
        }

        document.getElementById('storyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const loadingState = document.getElementById('loadingState');
            const storyResult = document.getElementById('storyResult');

            // الحصول على القيم من الحقول
            const childName = document.getElementById('childName').value;
            const childAge = document.getElementById('childAge').value;
            const interests = document.getElementById('interests').value;
            const lesson = document.getElementById('lesson').value;
            
            // إخفاء الزر، إظهار التحميل وإخفاء النتيجة السابقة
            submitBtn.classList.add('hidden');
            loadingState.classList.remove('hidden');
            loadingState.classList.add('block');
            storyResult.classList.add('hidden');
            document.getElementById('pdfDownloadContainer').classList.add('hidden');
            
            try {
                // الاتصال بـ الخادم (Backend) الخاص بنا
                const response = await fetch('/generate-story', {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        childName,
                        childAge,
                        interests,
                        lesson
                    })
                });

                const data = await response.json();
                
                if (response.ok && data.pages) {
                    currentStoryPages = data.pages;
                    currentPage = 0;
                    currentChildName = childName;
                    
                    renderStoryPage();
                    storyResult.classList.remove('hidden');
                    document.getElementById('pdfDownloadContainer').classList.remove('hidden');
                    
                    // تمرير الشاشة للأسفل للقصة
                    storyResult.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                     storyResult.innerHTML = `<p class="text-red-500 font-bold text-center">${data.error || 'Sorry, an unexpected error occurred while generating the story. Please try again.'}</p>`;
                     storyResult.classList.remove('hidden');
                }
            } catch (error) {
                 console.error("Error fetching from Server:", error);
                 storyResult.innerHTML = `<p class="text-red-500 font-bold text-center">Could not connect to the server. Make sure the backend is running properly.</p>`;
                 storyResult.classList.remove('hidden');
            } finally {
                // إعادة الزر إلى حالته ومسح الحقول (اختياري، يمكنك إلغاء this.reset إذا أردت إبقاء البيانات)
                // this.reset();
                submitBtn.classList.remove('hidden');
                loadingState.classList.add('hidden');
                loadingState.classList.remove('block');
            }
        });
    </script>
</body>
</html>
